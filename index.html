<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Tags</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#222;--s4:#2a2a2a;
--bd:#252525;--tx:#bbb;--tx2:#777;--tx3:#444;
--ac:#6e9aff;--acd:#1a3060;
--ptag:#152535;--ntag:#351520;
--red:#c55;--grn:#7b7;
--r:5px;--fs:0px
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:calc(14px + var(--fs));-webkit-tap-highlight-color:transparent}
input,select,button{font:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);outline:none}
input:focus{border-color:var(--ac)}
button{cursor:pointer;padding:5px 11px;transition:all .12s;white-space:nowrap}
button:hover{background:var(--s3)}
button:active{transform:scale(.97)}
select{padding:4px 6px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
#app{display:flex;flex-direction:column;height:100dvh;padding:10px;gap:7px}
#top{display:flex;gap:6px;align-items:center}
#q{flex:1;min-width:0;padding:8px 12px;font-size:calc(15px + var(--fs));background:var(--s1)}
#q::placeholder{color:var(--tx3)}
#gw{position:relative;flex-shrink:0}
#gb{padding:6px 14px;font-size:calc(12px + var(--fs));letter-spacing:.3px;color:var(--tx2)}
#gb:hover{color:var(--tx)}
#gb.on{background:var(--s3);border-color:var(--ac);color:var(--tx)}
#gp{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;z-index:20;min-width:220px}
#gp.v{display:flex;flex-direction:column;gap:10px}
.cg{display:flex;flex-direction:column;gap:4px}
.cg label{font-size:11px;color:var(--tx2);letter-spacing:.2px}
.cg .rw{display:flex;gap:3px}
.cg .rw button{flex:1;font-size:11px;padding:5px 4px}
.cg .rw button.on{background:var(--acd);border-color:var(--ac);color:#cde}
#note{font-size:calc(11px + var(--fs));color:var(--tx3)}
#cats{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:1px}
#cats::-webkit-scrollbar{display:none}
#cats span{padding:3px 10px;border-radius:12px;background:var(--s2);border:1px solid transparent;cursor:pointer;font-size:calc(12px + var(--fs));user-select:none;transition:all .12s;flex-shrink:0}
#cats span:hover{border-color:var(--s4)}
#cats span.on{background:var(--acd);border-color:var(--ac);color:#cde}
#subs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;min-height:0}
#subs::-webkit-scrollbar{display:none}
#subs span{padding:2px 8px;border-radius:10px;background:var(--s1);border:1px solid var(--bd);cursor:pointer;font-size:calc(11px + var(--fs));transition:all .12s;flex-shrink:0}
#subs span:hover{border-color:var(--tx3)}
#subs span.on{background:var(--acd);border-color:var(--ac);color:#cde}
#col{display:none;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
#col.v{display:block}
#cbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.cbl,.cbr{display:flex;gap:4px;align-items:center}
.cnt{font-size:calc(11px + var(--fs));color:var(--tx2)}
.cbr input{padding:4px 8px;font-size:11px;width:90px}
.cbr select{font-size:11px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.tg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:calc(12px + var(--fs));font-family:'SF Mono',Consolas,'Courier New',monospace}
.tg.p{background:var(--ptag)}
.tg.n{background:var(--ntag)}
.tg .x{cursor:pointer;color:var(--tx3);font-size:10px;line-height:1}
.tg .x:hover{color:var(--red)}
.nlbl{display:flex;align-items:center;gap:8px;margin-top:8px}
.nlbl span{font-size:calc(11px + var(--fs));color:var(--red)}
.nlbl button{font-size:10px;padding:2px 6px;color:var(--tx2)}
#bar{display:flex;justify-content:space-between;align-items:center}
#bar>span{color:var(--tx3);font-size:calc(11px + var(--fs))}
#negm{display:none;padding:3px 8px;font-size:calc(11px + var(--fs));border-radius:10px;color:var(--tx2)}
#negm.on{background:var(--ntag);color:var(--red);border-color:#522}
#res{flex:1;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r);min-height:0}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:var(--s2);padding:6px 10px;text-align:left;font-weight:600;font-size:calc(11px + var(--fs));color:var(--tx2);border-bottom:1px solid var(--bd);z-index:1}
td{padding:5px 10px;border-bottom:1px solid #151515;vertical-align:top}
tr.r:hover td{background:var(--s2)}
tr.r{cursor:pointer;transition:background .08s}
.nm{color:var(--ac);font-family:'SF Mono',Consolas,'Courier New',monospace;white-space:nowrap;font-size:calc(12px + var(--fs))}
.ct{color:var(--tx2);font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:calc(12px + var(--fs));text-align:right;white-space:nowrap}
.ds{font-size:calc(13px + var(--fs));line-height:1.5}
.ds .c{color:var(--tx3);font-size:calc(11px + var(--fs))}
.ds .kw{color:var(--tx3);font-size:calc(11px + var(--fs));margin-top:1px}
tr.pk .nm{color:var(--grn)}
#info{text-align:center;padding:16px;color:var(--tx3);font-size:calc(12px + var(--fs))}
.tt{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:7px 14px;border-radius:var(--r);font-size:12px;opacity:0;transition:all .2s;pointer-events:none;z-index:99}
.tt.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
#app{padding:8px;gap:6px}
#q{padding:10px}
#gp{right:0;width:calc(100vw - 16px);max-width:280px}
#cats span{padding:5px 11px}
#subs span{padding:4px 10px}
td{padding:6px 8px}
th{padding:6px 8px}
#negm{display:inline-flex}
tr.r{-webkit-user-select:none;user-select:none}
}
</style>
</head>
<body>
<div id="app">
<div id="top">
<input id="q" type="text" placeholder="태그, 키워드 검색..." autofocus>
<div id="gw">
<button id="gb">설정 ▾</button>
<div id="gp">
<div class="cg"><label>아티스트 접두사</label><div class="rw"><button data-a="">기본</button><button data-a="@">@ ANIMA</button><button data-a="artist:">artist: NAI</button></div></div>
<div class="cg"><label>태그 형식</label><div class="rw"><button data-f="0">밑줄 a_b</button><button data-f="1">띄어쓰기 a b</button></div></div>
<div class="cg"><label>괄호 처리</label><div class="rw"><button data-e="0">기본 ()</button><button data-e="1">이스케이프 \(\)</button></div></div>
<div class="cg"><label>복사 구분자</label><div class="rw"><button data-s="cs">쉼표</button><button data-s="nl">줄바꿈</button></div></div>
<div class="cg"><label>글자 크기</label><div class="rw"><button data-z="0">작게</button><button data-z="1">보통</button><button data-z="2">크게</button></div></div>
</div>
</div>
</div>
<div id="note">2026.03.23 기준 · 카운트 100 이상 번역</div>
<div id="cats"></div>
<div id="subs"></div>
<div id="col">
<div id="cbar">
<div class="cbl"><button id="cpb">복사</button><button id="clb" style="color:var(--red)">초기화</button><span class="cnt" id="cnt"></span></div>
<div class="cbr"><input id="pn" type="text" placeholder="프리셋 이름"><button id="svb">저장</button><select id="ld"><option value="">프리셋</option></select><button id="dlb" style="color:var(--red);padding:5px 7px">&times;</button></div>
</div>
<div class="tags" id="ptags"></div>
<div class="nlbl" id="nlbl" style="display:none"><span>네거티브</span><button id="cnb">복사</button></div>
<div class="tags" id="ntags"></div>
</div>
<div id="bar"><span>클릭: 추가 · shift+클릭: 네거티브 · 다시 클릭: 제거</span><button id="negm">N</button></div>
<div id="res">
<table><thead><tr><th style="width:150px">태그</th><th style="width:90px;text-align:right">수</th><th>설명</th></tr></thead><tbody id="tb"></tbody></table>
<div id="info">불러오는 중...</div>
</div>
</div>
<div class="tt" id="tt"></div>
<script>
(function(){
var CSV='danbooru_tags_classified.csv',TAXF='taxonomy.json';
var all=[],tax={},pos=[],neg=[],presets={};
var mj=null,mn=null,shown=100,negMode=false;
var cfg={art:'',space:false,sep:'cs',pesc:false,fs:1};

function fmt(n){return n.toLocaleString();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getSep(){return cfg.sep==='nl'?'\n':', ';}

function parseCSV(ln){
var r=[],c='',q=false;
for(var i=0;i<ln.length;i++){var ch=ln[i];
if(q){if(ch==='"'&&ln[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}
else{if(ch==='"'){q=true}else if(ch===','){r.push(c);c=''}else{c+=ch}}}
r.push(c);return r;
}

function parseDesc(d){
var o={mj:'',mn:'',tx:'',kw:[]};if(!d)return o;
var m=d.match(/^\[(.+?)\s*>\s*(.+?)\]\s*/);
if(m){o.mj=m[1].trim();o.mn=m[2].trim();d=d.slice(m[0].length);}
var ki=d.lastIndexOf('키워드:');
if(ki!==-1){o.tx=d.slice(0,ki).replace(/\.\s*$/,'').trim();o.kw=d.slice(ki+4).split(',').map(function(s){return s.trim()}).filter(Boolean);}
else{o.tx=d.trim();}
return o;
}

function fmtTag(name,cat){
var t=cfg.space?name.replace(/_/g,' '):name;
if(cat===1&&cfg.art)t=cfg.art+t;
if(cfg.pesc)t=t.replace(/\(/g,'\\(').replace(/\)/g,'\\)');
return t;
}

function toast(msg){var el=document.getElementById('tt');el.textContent=msg;el.classList.add('on');setTimeout(function(){el.classList.remove('on')},1400);}
function has(arr,n){return arr.some(function(t){return t.n===n});}

function applyFs(){
var v=['-1','0','2'];
document.documentElement.style.setProperty('--fs',(v[cfg.fs===undefined?1:cfg.fs])+'px');
}

function save(){
localStorage.setItem('dt-cfg',JSON.stringify(cfg));
localStorage.setItem('dt-pos',JSON.stringify(pos));
localStorage.setItem('dt-neg',JSON.stringify(neg));
localStorage.setItem('dt-pre',JSON.stringify(presets));
}

function load(){
try{
var c=localStorage.getItem('dt-cfg');if(c){var p=JSON.parse(c);cfg.art=p.art||'';cfg.space=!!p.space;cfg.sep=p.sep||'cs';cfg.pesc=!!p.pesc;cfg.fs=p.fs===undefined?1:p.fs;}
var p2=localStorage.getItem('dt-pos');if(p2)pos=JSON.parse(p2);
var n=localStorage.getItem('dt-neg');if(n)neg=JSON.parse(n);
var r=localStorage.getItem('dt-pre');if(r)presets=JSON.parse(r);
}catch(e){}
}

function filter(){
var t=all;
if(mj){t=t.filter(function(x){return x.p.mj===mj});if(mn)t=t.filter(function(x){return x.p.mn===mn});}
var q=document.getElementById('q').value.trim().toLowerCase();
if(q){var w=q.split(/\s+/);t=t.filter(function(x){return w.every(function(s){return x.s.indexOf(s)!==-1})});}
return t.sort(function(a,b){return b.cnt-a.cnt});
}

function render(){
var rd=document.getElementById('res'),st=rd.scrollTop;
var tags=filter(),sl=tags.slice(0,shown),h='';
for(var i=0;i<sl.length;i++){var t=sl[i],pk=has(pos,t.n)||has(neg,t.n);
h+='<tr class="r'+(pk?' pk':'')+'" data-n="'+esc(t.n)+'" data-c="'+t.cat+'">';
h+='<td class="nm">'+esc(t.n)+'</td><td class="ct">'+fmt(t.cnt)+'</td><td class="ds">';
if(t.p.mj)h+='<span class="c">['+esc(t.p.mj)+' > '+esc(t.p.mn)+']</span> ';
h+=esc(t.p.tx);
if(t.p.kw.length)h+='<div class="kw">'+t.p.kw.map(esc).join(' · ')+'</div>';
h+='</td></tr>';}
document.getElementById('tb').innerHTML=h;
document.getElementById('info').textContent=tags.length>shown?sl.length+' / '+tags.length:tags.length+'개';
rd.scrollTop=st;
}

function renderCol(){
var el=document.getElementById('col'),pe=document.getElementById('ptags'),ne=document.getElementById('ntags'),nl=document.getElementById('nlbl');
el.className=pos.length||neg.length?'v':'';
var total=pos.length+neg.length;
document.getElementById('cnt').textContent=total?total+'개':'';
pe.innerHTML=pos.map(function(t){return'<span class="tg p">'+esc(fmtTag(t.n,t.c))+' <span class="x" data-n="'+esc(t.n)+'" data-w="p">&times;</span></span>'}).join('');
ne.innerHTML=neg.map(function(t){return'<span class="tg n">'+esc(fmtTag(t.n,t.c))+' <span class="x" data-n="'+esc(t.n)+'" data-w="n">&times;</span></span>'}).join('');
nl.style.display=neg.length?'flex':'none';
save();render();
}

function toggle(name,cat,which){
var a=which==='n'?neg:pos,o=which==='n'?pos:neg;
var oi=o.findIndex(function(t){return t.n===name});if(oi!==-1)o.splice(oi,1);
var ai=a.findIndex(function(t){return t.n===name});
if(ai!==-1)a.splice(ai,1);else a.push({n:name,c:cat});
renderCol();
}

function buildCats(){
var el=document.getElementById('cats'),h='<span'+(mj===null?' class="on"':'')+' data-v="">전체</span>';
Object.keys(tax).forEach(function(k){h+='<span'+(mj===k?' class="on"':'')+' data-v="'+esc(k)+'">'+esc(k)+'</span>';});
el.innerHTML=h;buildSubs();
}

function buildSubs(){
var el=document.getElementById('subs');
if(!mj||!tax[mj]){el.innerHTML='';return;}
var h='<span'+(mn===null?' class="on"':'')+' data-v="">전체</span>';
tax[mj].forEach(function(s){h+='<span'+(mn===s?' class="on"':'')+' data-v="'+esc(s)+'">'+esc(s)+'</span>';});
el.innerHTML=h;
}

function loadPresets(){
var s=document.getElementById('ld');s.innerHTML='<option value="">프리셋</option>';
Object.keys(presets).forEach(function(k){s.innerHTML+='<option value="'+esc(k)+'">'+esc(k)+'</option>';});
}

function syncCfg(){
document.querySelectorAll('[data-a]').forEach(function(b){b.classList.toggle('on',b.dataset.a===(cfg.art||''))});
document.querySelectorAll('[data-f]').forEach(function(b){b.classList.toggle('on',b.dataset.f===(cfg.space?'1':'0'))});
document.querySelectorAll('[data-e]').forEach(function(b){b.classList.toggle('on',b.dataset.e===(cfg.pesc?'1':'0'))});
document.querySelectorAll('[data-s]').forEach(function(b){b.classList.toggle('on',b.dataset.s===(cfg.sep||'cs'))});
document.querySelectorAll('[data-z]').forEach(function(b){b.classList.toggle('on',b.dataset.z===''+(cfg.fs===undefined?1:cfg.fs))});
}

var timer;
function debounce(fn,ms){return function(){clearTimeout(timer);timer=setTimeout(fn,ms)};}

function setup(){
var gw=document.getElementById('gw'),gb=document.getElementById('gb'),gp=document.getElementById('gp');
gb.addEventListener('click',function(){var o=gp.classList.toggle('v');gb.classList.toggle('on',o);});
document.addEventListener('click',function(e){if(!gw.contains(e.target)){gp.classList.remove('v');gb.classList.remove('on');}});
gp.addEventListener('click',function(e){
var b=e.target.closest('button');if(!b)return;
if(b.dataset.a!==undefined){cfg.art=b.dataset.a;syncCfg();save();renderCol();}
if(b.dataset.f!==undefined){cfg.space=b.dataset.f==='1';syncCfg();save();renderCol();}
if(b.dataset.e!==undefined){cfg.pesc=b.dataset.e==='1';syncCfg();save();renderCol();}
if(b.dataset.s!==undefined){cfg.sep=b.dataset.s;syncCfg();save();}
if(b.dataset.z!==undefined){cfg.fs=+b.dataset.z;syncCfg();save();applyFs();}
});
document.getElementById('q').addEventListener('input',debounce(function(){shown=100;render();},120));
document.getElementById('cats').addEventListener('click',function(e){var v=e.target.dataset.v;if(v===undefined)return;mj=v||null;mn=null;shown=100;buildCats();render();});
document.getElementById('subs').addEventListener('click',function(e){var v=e.target.dataset.v;if(v===undefined)return;mn=v||null;shown=100;buildSubs();render();});
document.getElementById('tb').addEventListener('click',function(e){var tr=e.target.closest('tr.r');if(!tr)return;toggle(tr.dataset.n,+tr.dataset.c,(e.shiftKey||negMode)?'n':'p');});
document.getElementById('ptags').addEventListener('click',function(e){if(e.target.classList.contains('x'))toggle(e.target.dataset.n,0,'p');});
document.getElementById('ntags').addEventListener('click',function(e){if(e.target.classList.contains('x'))toggle(e.target.dataset.n,0,'n');});
document.getElementById('cpb').addEventListener('click',function(){if(!pos.length){toast('비어있음');return;}navigator.clipboard.writeText(pos.map(function(t){return fmtTag(t.n,t.c)}).join(getSep())).then(function(){toast(pos.length+'개 복사됨');});});
document.getElementById('cnb').addEventListener('click',function(){if(!neg.length)return;navigator.clipboard.writeText(neg.map(function(t){return fmtTag(t.n,t.c)}).join(getSep())).then(function(){toast('네거티브 '+neg.length+'개 복사됨');});});
document.getElementById('clb').addEventListener('click',function(){pos=[];neg=[];renderCol();});
document.getElementById('svb').addEventListener('click',function(){var n=document.getElementById('pn').value.trim();if(!n)return;presets[n]={p:pos.slice(),n:neg.slice()};save();loadPresets();toast('저장됨');document.getElementById('pn').value='';});
document.getElementById('ld').addEventListener('change',function(){var n=this.value;if(!n||!presets[n])return;pos=(presets[n].p||[]).slice();neg=(presets[n].n||[]).slice();renderCol();this.value='';});
document.getElementById('dlb').addEventListener('click',function(){var s=document.getElementById('ld'),n=s.value;if(!n)return;delete presets[n];save();loadPresets();toast('삭제됨');});
document.getElementById('negm').addEventListener('click',function(){negMode=!negMode;this.classList.toggle('on',negMode);toast(negMode?'네거티브 모드':'일반 모드');});
document.getElementById('res').addEventListener('scroll',function(){if(this.scrollTop+this.clientHeight>=this.scrollHeight-50){var p=shown;shown+=100;if(shown!==p)render();}});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.getElementById('q').value='';shown=100;render();document.getElementById('q').focus();}});
syncCfg();
}

async function init(){
load();applyFs();
try{
var r=await Promise.all([fetch(CSV).then(function(r){return r.text()}),fetch(TAXF).then(function(r){return r.json()}).catch(function(){return{}})]);
tax=r[1]||{};
var lines=r[0].split('\n');
for(var i=1;i<lines.length;i++){var ln=lines[i].trim();if(!ln)continue;var c=parseCSV(ln);if(c.length<4)continue;
var p=parseDesc(c[3]);all.push({n:c[0],cat:+c[1],cnt:+c[2],p:p,s:(c[0]+' '+p.tx+' '+p.kw.join(' ')).toLowerCase()});}
}catch(e){document.getElementById('info').textContent='데이터 로드 실패';return;}
buildCats();loadPresets();renderCol();render();
document.getElementById('info').textContent=all.length+'개';
setup();
}

init();
})();
</script>
</body>
</html>
