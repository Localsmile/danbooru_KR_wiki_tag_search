<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Tags</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#222;--s4:#2a2a2a;--bd:#252525;--tx:#bbb;--tx2:#777;--tx3:#444;--ac:#6e9aff;--acd:#1a3060;--ptag:#152535;--red:#c55;--grn:#7b7;--c0:#6e9aff;--c1:#e87070;--c3:#c080e8;--c4:#60c860;--c5:#999;--cx:#d4a030;--r:5px;--fs:0px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:calc(16px + var(--fs));-webkit-tap-highlight-color:transparent}
input,select,button{font:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);outline:none}
input:focus{border-color:var(--ac)}
button{cursor:pointer;padding:5px 11px;transition:all .12s;white-space:nowrap}
button:hover{background:var(--s3)}
button:active{transform:scale(.97)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
#app{display:flex;flex-direction:column;height:100dvh;padding:10px 16px;gap:7px;max-width:1000px;margin:0 auto;width:100%}
#nav{display:flex;gap:2px;border-bottom:1px solid var(--bd);padding-bottom:4px}
#nav a{color:var(--tx3);text-decoration:none;padding:5px 12px;font-size:calc(12px + var(--fs));border-radius:var(--r) var(--r) 0 0;transition:all .12s}
#nav a:hover{color:var(--tx2);background:var(--s2)}
#nav a.on{color:var(--ac);border-bottom:2px solid var(--ac)}
#top{display:flex;gap:6px;align-items:center}
#q{flex:1;min-width:0;padding:8px 12px;font-size:calc(17px + var(--fs));background:var(--s1)}
#q::placeholder{color:var(--tx3)}
#fsz{display:flex;align-items:center;flex-shrink:0}
#fsz button{padding:5px 9px;font-size:calc(12px + var(--fs));border-radius:0}
#fsz button:first-child{border-radius:var(--r) 0 0 var(--r)}
#fsz button:last-child{border-radius:0 var(--r) var(--r) 0;border-left:none}
#fsz span{padding:5px 6px;background:var(--s1);border:1px solid var(--bd);border-left:none;border-right:none;font-size:calc(11px + var(--fs));color:var(--tx2);min-width:30px;text-align:center}
#cats{display:flex;gap:5px;flex-wrap:wrap}
#cats span{padding:4px 12px;border-radius:12px;background:var(--s2);border:1px solid transparent;cursor:pointer;font-size:calc(13px + var(--fs));user-select:none;transition:all .12s}
#cats span:hover{border-color:var(--s4)}
#cats span.on{background:var(--acd);border-color:var(--ac);color:#cde}
#subp{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;display:none}
#subp.v{display:block}
#subs{display:flex;gap:4px;flex-wrap:wrap}
#subs span{padding:3px 9px;border-radius:10px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;font-size:calc(12px + var(--fs));transition:all .12s}
#subs span:hover{border-color:var(--tx3)}
#subs span.on{background:var(--acd);border-color:var(--ac);color:#cde}
#opt{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;display:flex;flex-direction:column;gap:6px}
#fmt{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
#fmt .fl{color:var(--tx2);font-size:calc(11px + var(--fs));margin-left:6px}
#fmt .fl:first-child{margin-left:0}
#fmt button{font-size:calc(11px + var(--fs));padding:3px 8px;color:var(--tx2)}
#fmt button.on{background:var(--acd);border-color:var(--ac);color:#cde}
#fmt .sp{width:1px;height:14px;background:var(--bd);margin:0 6px;flex-shrink:0}
#note{font-size:calc(11px + var(--fs));color:var(--tx3)}
#modes{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;display:flex;gap:16px;flex-wrap:wrap}
.md{display:flex;align-items:center;gap:8px}
.md button{font-size:calc(11px + var(--fs));padding:3px 8px;color:var(--tx2)}
.md button.on{background:var(--acd);border-color:var(--ac);color:#cde}
.md-desc{font-size:calc(10px + var(--fs));color:var(--tx3)}
#col{display:none;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
#col.v{display:block}
#cbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.cbl{display:flex;gap:4px;align-items:center}
.cnt{font-size:calc(12px + var(--fs));color:var(--tx2)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.tg{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:3px;font-size:calc(14px + var(--fs));font-family:'SF Mono',Consolas,'Courier New',monospace;border-left:2px solid var(--c0);background:var(--ptag)}
.tg[data-c="1"]{border-left-color:var(--c1)}
.tg[data-c="3"]{border-left-color:var(--c3)}
.tg[data-c="4"]{border-left-color:var(--c4)}
.tg[data-c="5"]{border-left-color:var(--c5)}
.tg[data-c="-1"]{border-left-color:var(--cx);border-left-style:dashed}
.tg .x{cursor:pointer;color:var(--tx3);font-size:inherit;line-height:1}
.tg .x:hover{color:var(--red)}
#bar{color:var(--tx3);font-size:calc(12px + var(--fs))}
#res{flex:1;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r);min-height:0}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:var(--s2);padding:6px 10px;text-align:left;font-weight:600;font-size:calc(12px + var(--fs));color:var(--tx2);border-bottom:1px solid var(--bd);z-index:1}
td{padding:5px 10px;border-bottom:1px solid #151515;vertical-align:top}
tr.r:hover td{background:var(--s2)}
tr.r{cursor:pointer;transition:background .08s}
.tc{min-width:120px}
.nm{font-weight:700;font-family:'SF Mono',Consolas,'Courier New',monospace;white-space:nowrap;font-size:calc(13px + var(--fs))}
tr.r[data-c="0"] .nm{color:var(--c0)}
tr.r[data-c="1"] .nm{color:var(--c1)}
tr.r[data-c="3"] .nm{color:var(--c3)}
tr.r[data-c="4"] .nm{color:var(--c4)}
tr.r[data-c="5"] .nm{color:var(--c5)}
tr.pk td:first-child{box-shadow:inset 3px 0 0 var(--ac)}
tr.pk td{background:rgba(110,154,255,.05)}
.ct{color:var(--tx2);font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:calc(12px + var(--fs));white-space:nowrap}
.kw{color:var(--tx3);font-size:calc(11px + var(--fs));margin-top:4px;line-height:1.4}
.ds{font-size:calc(14px + var(--fs));line-height:1.5}
.ds .c{color:var(--tx3);font-size:calc(12px + var(--fs))}
#info{text-align:center;padding:16px;color:var(--tx3);font-size:calc(13px + var(--fs))}
.tt{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);border:1px solid var(--bd);color:var(--tx);padding:7px 14px;border-radius:var(--r);font-size:calc(13px + var(--fs));opacity:0;transition:all .2s;pointer-events:none;z-index:99;font-family:'SF Mono',Consolas,'Courier New',monospace}
.tt.on{opacity:1;transform:translateX(-50%) translateY(0)}
#pv{display:none;position:fixed;z-index:50;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
#pv.v{display:block}
.pv-g{display:flex;gap:6px}
.pv-g a{display:block;flex-shrink:0}
.pv-g img{width:140px;height:140px;object-fit:cover;border-radius:3px;background:var(--s2);display:block}
.pv-s{font-size:calc(10px + var(--fs));color:var(--tx3);margin-top:4px}
.pv-ld{padding:8px 16px;color:var(--tx3);font-size:calc(11px + var(--fs))}
@media(max-width:600px){
#app{padding:8px;gap:6px;max-width:100%}
#nav a{padding:5px 8px;font-size:calc(11px + var(--fs))}
#modes{gap:10px;padding:7px 10px}
#q{padding:10px}
#cats span{padding:5px 11px}
#subs span{padding:4px 10px}
#opt{padding:7px 10px}
#fmt{gap:3px}
#fmt .fl{margin-left:4px;font-size:calc(10px + var(--fs))}
#fmt button{padding:3px 6px;font-size:calc(10px + var(--fs))}
td{padding:6px 8px}
th{padding:6px 8px}
tr.r{-webkit-user-select:none;user-select:none}
.pv-g img{width:100px;height:100px}
}
</style>
</head>
<body>
<div id="app">
<nav id="nav">
<a href="index.html" class="on">태그 검색</a>
<a href="converter.html">프롬프트 변환</a>
<a href="artist.html">아티스트 작품</a>
</nav>
<div id="top">
<input id="q" type="text" placeholder="태그, 키워드 검색..." autofocus>
<div id="fsz"><button id="fsm">A-</button><span id="fsv">18</span><button id="fsp">A+</button></div>
</div>
<div id="cats"></div>
<div id="subp"><div id="subs"></div></div>
<div id="modes">
<div class="md"><button id="qkb">바로 복사</button><span class="md-desc">클릭시 태그 바로 복사</span></div>
<div class="md"><button id="pvb">미리보기</button><span class="md-desc">호버/길게 누르기로 예시 이미지</span></div>
</div>
<div id="opt">
<div id="fmt">
<span class="fl">아티스트</span><button data-a="">없음</button><button data-a="@">@</button><button data-a="artist:">artist:</button>
<div class="sp"></div>
<span class="fl">띄어쓰기</span><button data-f="0">밑줄 a_b</button><button data-f="1">공백 a b</button>
<div class="sp"></div>
<span class="fl">괄호</span><button data-e="0">그대로 ()</button><button data-e="1">이스케이프 \(\)</button>
<div class="sp"></div>
<span class="fl">구분자</span><button data-s="cs">쉼표</button><button data-s="nl">줄바꿈</button>
</div>
<div id="note">2026.03.23 기준 · 카운트 100 이상 번역</div>
</div>
<div id="col">
<div id="cbar"><div class="cbl"><button id="cpb">복사</button><button id="clb" style="color:var(--red)">초기화</button><span class="cnt" id="cnt"></span></div></div>
<div class="tags" id="ptags"></div>
</div>
<div id="bar"></div>
<div id="res">
<table><thead><tr><th style="min-width:140px">태그</th><th>설명</th></tr></thead><tbody id="tb"></tbody></table>
<div id="sentinel" style="height:1px"></div>
<div id="info">불러오는 중...</div>
</div>
</div>
<div id="pv"></div>
<div class="tt" id="tt"></div>
<script>
(function(){
var CSV='danbooru_tags_classified.csv',TAXF='taxonomy.json';
var all=[],tax={},pos=[];
var mj=null,mn=null,shown=200,lastTotal=0;
var cfg={art:'',space:false,sep:'cs',pesc:false,fs:18,quick:true,preview:true};
var DAPI='https://danbooru.donmai.us';
var PROXY='https://api.allorigins.win/raw?url=';
var imgCache=new Map();
var isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
var pvRow=null,pvTimer,pvHideTimer,lpTimer,lpBlock=false,useProxy=false;
function fmt(n){return n.toLocaleString()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getSep(){return cfg.sep==='nl'?'\n':', '}
function parseCSV(ln){var r=[],c='',q=false;for(var i=0;i<ln.length;i++){var ch=ln[i];if(q){if(ch==='"'&&ln[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}else{if(ch==='"'){q=true}else if(ch===','){r.push(c);c=''}else{c+=ch}}}r.push(c);return r}
function parseDesc(d){var o={mj:'',mn:'',tx:'',kw:[]};if(!d)return o;var m=d.match(/^\[(.+?)\s*>\s*(.+?)\]\s*/);if(m){o.mj=m[1].trim();o.mn=m[2].trim();d=d.slice(m[0].length)}var ki=d.lastIndexOf('키워드:');if(ki!==-1){o.tx=d.slice(0,ki).replace(/\.\s*$/,'').trim();o.kw=d.slice(ki+4).split(',').map(function(s){return s.trim()}).filter(Boolean)}else{o.tx=d.trim()}return o}
function fmtTag(name,cat){var t=cfg.space?name.replace(/_/g,' '):name;if(cat===1&&cfg.art)t=cfg.art+t;if(cfg.pesc)t=t.replace(/\(/g,'\\(').replace(/\)/g,'\\)');return t}
function toast(msg){var el=document.getElementById('tt');el.textContent=msg;el.classList.add('on');setTimeout(function(){el.classList.remove('on')},1400)}
function has(arr,n){return arr.some(function(t){return t.n===n})}
function applyFs(){var v=cfg.fs||18;document.documentElement.style.setProperty('--fs',(v-16)+'px');document.getElementById('fsv').textContent=v}
function save(){localStorage.setItem('dt-cfg',JSON.stringify(cfg));localStorage.setItem('dt-pos',JSON.stringify(pos))}
function load(){try{var c=localStorage.getItem('dt-cfg');if(c){var p=JSON.parse(c);cfg.art=p.art||'';cfg.space=!!p.space;cfg.sep=p.sep||'cs';cfg.pesc=!!p.pesc;if(typeof p.fs==='number'&&p.fs<10){cfg.fs=[14,16,18][p.fs]||18}else{cfg.fs=p.fs||18}cfg.quick=typeof p.quick==='boolean'?p.quick:true;cfg.preview=typeof p.preview==='boolean'?p.preview:true}var p2=localStorage.getItem('dt-pos');if(p2)pos=JSON.parse(p2)}catch(e){}}
function scoreM(name,q){if(name===q)return 0;var p=name.split('_');for(var i=0;i<p.length;i++){if(p[i]===q)return 1}if(name.indexOf(q)!==-1)return 2;return 3}
function filter(){var t=all;if(mj){t=t.filter(function(x){return x.p.mj===mj});if(mn)t=t.filter(function(x){return x.p.mn===mn})}var q=document.getElementById('q').value.trim().toLowerCase();if(q){var w=q.split(/\s+/);t=t.filter(function(x){return w.every(function(s){return x.s.indexOf(s)!==-1})});t.forEach(function(x){var nm=x.n.toLowerCase();x._sc=w.reduce(function(m,s){return Math.max(m,scoreM(nm,s))},0)});return t.sort(function(a,b){return a._sc!==b._sc?a._sc-b._sc:b.cnt-a.cnt})}return t.sort(function(a,b){return b.cnt-a.cnt})}
function updateBar(){var b=cfg.quick?'클릭: 복사':'클릭: 추가 · 다시 클릭: 제거';if(cfg.preview&&isMobile)b+=' · 길게: 미리보기';document.getElementById('bar').textContent=b}
function render(){var rd=document.getElementById('res'),st=rd.scrollTop;var tags=filter();lastTotal=tags.length;var sl=tags.slice(0,shown),h='';for(var i=0;i<sl.length;i++){var t=sl[i],pk=!cfg.quick&&has(pos,t.n);h+='<tr class="r'+(pk?' pk':'')+'" data-n="'+esc(t.n)+'" data-c="'+t.cat+'">';h+='<td class="tc"><span class="nm">'+esc(t.n)+'</span> <span class="ct">('+fmt(t.cnt)+')</span>';if(t.p.kw.length)h+='<div class="kw">'+t.p.kw.map(esc).join(' · ')+'</div>';h+='</td><td class="ds">';if(t.p.mj)h+='<span class="c">['+esc(t.p.mj)+' > '+esc(t.p.mn)+']</span> ';h+=esc(t.p.tx);h+='</td></tr>'}document.getElementById('tb').innerHTML=h;document.getElementById('info').textContent=lastTotal>shown?shown+' / '+lastTotal:lastTotal+'개';rd.scrollTop=st}
function renderCol(){var el=document.getElementById('col'),pe=document.getElementById('ptags');el.className=(!cfg.quick&&pos.length)?'v':'';document.getElementById('cnt').textContent=pos.length?pos.length+'개':'';pe.innerHTML=pos.map(function(t){return'<span class="tg" data-c="'+t.c+'">'+esc(fmtTag(t.n,t.c))+' <span class="x" data-n="'+esc(t.n)+'">&times;</span></span>'}).join('');save();render()}
function toggle(name,cat){if(cfg.quick){var t=fmtTag(name,cat);navigator.clipboard.writeText(t).then(function(){toast(t+' 복사됨')});return}var ai=pos.findIndex(function(t){return t.n===name});if(ai!==-1)pos.splice(ai,1);else pos.push({n:name,c:cat});renderCol()}
function buildCats(){var el=document.getElementById('cats'),h='<span'+(mj===null?' class="on"':'')+' data-v="">전체</span>';Object.keys(tax).forEach(function(k){h+='<span'+(mj===k?' class="on"':'')+' data-v="'+esc(k)+'">'+esc(k)+'</span>'});el.innerHTML=h;buildSubs()}
function buildSubs(){var el=document.getElementById('subs'),sp=document.getElementById('subp');if(!mj||!tax[mj]){el.innerHTML='';sp.classList.remove('v');return}sp.classList.add('v');var h='<span'+(mn===null?' class="on"':'')+' data-v="">전체</span>';tax[mj].forEach(function(s){h+='<span'+(mn===s?' class="on"':'')+' data-v="'+esc(s)+'">'+esc(s)+'</span>'});el.innerHTML=h}
function syncCfg(){document.querySelectorAll('#fmt [data-a]').forEach(function(b){b.classList.toggle('on',b.dataset.a===(cfg.art||''))});document.querySelectorAll('#fmt [data-f]').forEach(function(b){b.classList.toggle('on',b.dataset.f===(cfg.space?'1':'0'))});document.querySelectorAll('#fmt [data-e]').forEach(function(b){b.classList.toggle('on',b.dataset.e===(cfg.pesc?'1':'0'))});document.querySelectorAll('#fmt [data-s]').forEach(function(b){b.classList.toggle('on',b.dataset.s===(cfg.sep||'cs'))});document.getElementById('qkb').classList.toggle('on',!!cfg.quick);document.getElementById('pvb').classList.toggle('on',!!cfg.preview)}
var timer;function debounce(fn,ms){return function(){clearTimeout(timer);timer=setTimeout(fn,ms)}}
async function dFetch(path){if(!useProxy){try{var r=await fetch(DAPI+path);return r}catch(e){useProxy=true}}return fetch(PROXY+encodeURIComponent(DAPI+path))}
async function fetchPreview(tag){if(imgCache.has(tag))return imgCache.get(tag);var imgs=[],src='';try{var r=await dFetch('/wiki_pages.json?search[title]='+encodeURIComponent(tag));if(r.ok){var ws=await r.json();if(ws.length&&ws[0].body){var b=ws[0].body,pids=[];var ei=b.search(/h[1-6]\.\s*Examples?\b/i);if(ei!==-1){var sec=b.slice(ei),lines=sec.split('\n'),st=lines[0]+'\n';for(var i=1;i<lines.length;i++){if(/^h[1-6]\./.test(lines[i]))break;st+=lines[i]+'\n'}var m,re=/post\s*#(\d+)/gi;while((m=re.exec(st))&&pids.length<2)pids.push(m[1])}if(pids.length){var pr=await dFetch('/posts.json?tags=id:'+pids.join(',')+'&limit='+pids.length);if(pr.ok)(await pr.json()).forEach(function(p){if(p.preview_file_url&&imgs.length<2)imgs.push({u:p.preview_file_url,id:p.id})});if(imgs.length)src='wiki'}}}}catch(e){}if(!imgs.length){try{var r=await dFetch('/posts.json?tags='+encodeURIComponent(tag)+'&limit=2');if(r.ok)(await r.json()).forEach(function(p){if(p.preview_file_url&&imgs.length<2)imgs.push({u:p.preview_file_url,id:p.id})});if(imgs.length)src='posts'}catch(e){}}var res=imgs.length?{src:src,imgs:imgs}:null;imgCache.set(tag,res);return res}
function hidePreview(){document.getElementById('pv').classList.remove('v');pvRow=null;clearTimeout(pvTimer);clearTimeout(pvHideTimer)}
function posPv(tr){var pv=document.getElementById('pv');var rc=tr.getBoundingClientRect();var ph=pv.offsetHeight,pw=pv.offsetWidth;var t=rc.top-ph-8;if(t<8)t=rc.bottom+8;if(t+ph>window.innerHeight-8)t=window.innerHeight-ph-8;var l=isMobile?(window.innerWidth-pw)/2:rc.left;l=Math.max(8,Math.min(l,window.innerWidth-pw-8));pv.style.top=Math.max(8,t)+'px';pv.style.left=l+'px'}
async function showPv(tr){if(!cfg.preview)return;var pv=document.getElementById('pv');pv.innerHTML='<div class="pv-ld">...</div>';pv.classList.add('v');posPv(tr);var data=await fetchPreview(tr.dataset.n);if(!pv.classList.contains('v'))return;if(!isMobile&&pvRow!==tr)return;if(!data){pv.classList.remove('v');return}var h='<div class="pv-g">';data.imgs.forEach(function(im){h+='<a href="'+DAPI+'/posts/'+im.id+'" target="_blank" rel="noopener"><img src="'+esc(im.u)+'"></a>'});h+='</div><div class="pv-s">'+(data.src==='wiki'?'wiki':'posts')+'</div>';pv.innerHTML=h;posPv(tr)}
function setup(){
document.getElementById('fsm').addEventListener('click',function(){cfg.fs=Math.max(12,cfg.fs-1);applyFs();save()});
document.getElementById('fsp').addEventListener('click',function(){cfg.fs=Math.min(24,cfg.fs+1);applyFs();save()});
document.getElementById('modes').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;if(b.id==='qkb'){cfg.quick=!cfg.quick;syncCfg();save();updateBar();renderCol()}if(b.id==='pvb'){cfg.preview=!cfg.preview;syncCfg();save();updateBar();if(!cfg.preview)hidePreview()}});
document.getElementById('fmt').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;if(b.dataset.a!==undefined){cfg.art=b.dataset.a;syncCfg();save();renderCol()}if(b.dataset.f!==undefined){cfg.space=b.dataset.f==='1';syncCfg();save();renderCol()}if(b.dataset.e!==undefined){cfg.pesc=b.dataset.e==='1';syncCfg();save();renderCol()}if(b.dataset.s!==undefined){cfg.sep=b.dataset.s;syncCfg();save()}});
document.getElementById('q').addEventListener('input',debounce(function(){shown=200;render()},120));
document.getElementById('cats').addEventListener('click',function(e){var v=e.target.dataset.v;if(v===undefined)return;mj=v||null;mn=null;shown=200;buildCats();render()});
document.getElementById('subs').addEventListener('click',function(e){var v=e.target.dataset.v;if(v===undefined)return;mn=v||null;shown=200;buildSubs();render()});
document.getElementById('tb').addEventListener('click',function(e){if(lpBlock){lpBlock=false;return}var tr=e.target.closest('tr.r');if(!tr)return;toggle(tr.dataset.n,+tr.dataset.c)});
document.getElementById('ptags').addEventListener('click',function(e){if(e.target.classList.contains('x')){var n=e.target.dataset.n;var ai=pos.findIndex(function(t){return t.n===n});if(ai!==-1)pos.splice(ai,1);renderCol()}});
document.getElementById('cpb').addEventListener('click',function(){if(!pos.length){toast('비어있음');return}navigator.clipboard.writeText(pos.map(function(t){return fmtTag(t.n,t.c)}).join(getSep())).then(function(){toast(pos.length+'개 복사됨')})});
document.getElementById('clb').addEventListener('click',function(){pos=[];renderCol()});
if(!isMobile){
document.getElementById('tb').addEventListener('mouseover',function(e){if(!cfg.preview)return;var tr=e.target.closest('tr.r');if(tr===pvRow)return;clearTimeout(pvTimer);clearTimeout(pvHideTimer);if(!tr){pvHideTimer=setTimeout(hidePreview,100);return}pvRow=tr;pvTimer=setTimeout(function(){showPv(tr)},300)});
document.getElementById('res').addEventListener('mouseleave',function(){if(!cfg.preview)return;clearTimeout(pvTimer);pvHideTimer=setTimeout(hidePreview,200)});
document.getElementById('pv').addEventListener('mouseenter',function(){clearTimeout(pvHideTimer)});
document.getElementById('pv').addEventListener('mouseleave',function(){hidePreview()});
}
if(isMobile){
document.getElementById('tb').addEventListener('touchstart',function(e){if(!cfg.preview)return;var tr=e.target.closest('tr.r');if(!tr)return;lpBlock=false;lpTimer=setTimeout(function(){lpBlock=true;showPv(tr)},500)},{passive:true});
document.getElementById('tb').addEventListener('touchend',function(){clearTimeout(lpTimer)},{passive:true});
document.getElementById('tb').addEventListener('touchmove',function(){clearTimeout(lpTimer)},{passive:true});
document.addEventListener('click',function(e){if(document.getElementById('pv').classList.contains('v')&&!e.target.closest('#pv'))hidePreview()});
}
document.getElementById('res').addEventListener('scroll',function(){hidePreview();if(this.scrollTop+this.clientHeight>=this.scrollHeight-150&&shown<lastTotal){shown+=200;render()}});
var obs=new IntersectionObserver(function(ent){if(ent[0].isIntersecting&&shown<lastTotal){shown+=200;render()}},{root:document.getElementById('res'),rootMargin:'300px 0px'});
obs.observe(document.getElementById('sentinel'));
document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.getElementById('q').value='';shown=200;render();document.getElementById('q').focus()}});
syncCfg();updateBar();
}
async function init(){load();applyFs();try{var r=await Promise.all([fetch(CSV).then(function(r){return r.text()}),fetch(TAXF).then(function(r){return r.json()}).catch(function(){return{}})]);tax=r[1]||{};var lines=r[0].split('\n');for(var i=1;i<lines.length;i++){var ln=lines[i].trim();if(!ln)continue;var c=parseCSV(ln);if(c.length<4)continue;var p=parseDesc(c[3]);all.push({n:c[0],cat:+c[1],cnt:+c[2],p:p,s:(c[0]+' '+p.tx+' '+p.kw.join(' ')).toLowerCase()})}}catch(e){document.getElementById('info').textContent='데이터 로드 실패';return}buildCats();renderCol();render();document.getElementById('info').textContent=all.length+'개';setup()}
init();
})();
</script>
</body>
</html>
