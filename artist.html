<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>아티스트 작품 확인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#222;--s4:#2a2a2a;--bd:#252525;--tx:#bbb;--tx2:#777;--tx3:#444;--ac:#6e9aff;--acd:#1a3060;--red:#c55;--r:5px;--fs:2px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:calc(16px + var(--fs));-webkit-tap-highlight-color:transparent}
input,select,button,textarea{font:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);outline:none}
input:focus,textarea:focus{border-color:var(--ac)}
button{cursor:pointer;padding:5px 11px;transition:all .12s;white-space:nowrap}
button:hover{background:var(--s3)}
button:active{transform:scale(.97)}
textarea{resize:vertical;padding:10px 12px;min-height:70px;font-size:calc(13px + var(--fs));line-height:1.5;background:var(--bg)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
#app{display:flex;flex-direction:column;height:100dvh;padding:10px 16px;gap:7px;max-width:1000px;margin:0 auto;width:100%}
#nav{display:flex;gap:2px;border-bottom:1px solid var(--bd);padding-bottom:4px}
#nav a{color:var(--tx3);text-decoration:none;padding:5px 12px;font-size:calc(12px + var(--fs));border-radius:var(--r) var(--r) 0 0;transition:all .12s}
#nav a:hover{color:var(--tx2);background:var(--s2)}
#nav a.on{color:var(--ac);border-bottom:2px solid var(--ac)}
#desc{font-size:calc(11px + var(--fs));color:var(--tx2);padding:2px 0}
#inp{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
#inp textarea{width:100%}
#acts{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
#acts button.run{background:var(--acd);border-color:var(--ac);color:#cde}
.st{font-size:calc(11px + var(--fs));color:var(--tx3)}
#out{flex:1;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--r);min-height:0}
#atbl{width:100%;border-collapse:collapse}
#atbl th{position:sticky;top:0;background:var(--s2);padding:6px 10px;text-align:left;font-weight:600;font-size:calc(12px + var(--fs));color:var(--tx2);border-bottom:1px solid var(--bd);z-index:1}
#atbl td{padding:8px 10px;border-bottom:1px solid #151515;vertical-align:middle}
.an{font-weight:700;font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:calc(13px + var(--fs))}
.an a{color:var(--ac);text-decoration:none}
.an a:hover{text-decoration:underline}
.av{display:flex;align-items:center;gap:8px}
.av button{padding:4px 10px;font-size:calc(14px + var(--fs));flex-shrink:0}
.av img{max-height:240px;max-width:340px;object-fit:contain;border-radius:3px;background:var(--s2);display:block;cursor:pointer}
.av img:hover{opacity:.85}
.ac{font-size:calc(11px + var(--fs));color:var(--tx3);min-width:30px;text-align:center}
.ae{color:var(--red);font-size:calc(12px + var(--fs))}
.al{color:var(--tx3);font-size:calc(12px + var(--fs))}
#info{text-align:center;padding:20px;color:var(--tx3);font-size:calc(13px + var(--fs))}
@media(max-width:600px){
#app{padding:8px;gap:6px;max-width:100%}
#nav a{padding:5px 8px;font-size:calc(11px + var(--fs))}
#inp{padding:8px}
.av img{max-height:180px;max-width:280px}
.av button{padding:4px 8px;font-size:calc(12px + var(--fs))}
}
</style>
</head>
<body>
<div id="app">
<nav id="nav">
<a href="index.html">태그 검색</a>
<a href="converter.html">프롬프트 변환</a>
<a href="artist.html" class="on">아티스트 작품</a>
</nav>
<div id="desc">프롬프트에서 아티스트를 추출하고 Danbooru 작품 확인</div>
<div id="inp">
<textarea id="prompt" rows="3" placeholder="프롬프트 붙여넣기 (전부 넣어도 아티스트 태그 자동 추출됨)"></textarea>
<div id="acts">
<button class="run" id="gobtn">추출</button>
<span class="st" id="status"></span>
</div>
</div>
<div id="out">
<table id="atbl"><thead><tr><th style="min-width:140px">아티스트</th><th>작품</th></tr></thead><tbody id="tbody"></tbody></table>
<div id="info">프롬프트를 붙여넣고 추출 버튼 클릭</div>
</div>
</div>
<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "fc6eda06bf1b423d98290d61546f75d5"}'></script>
<!-- End Cloudflare Web Analytics -->
<script>
(function(){
var CSV='danbooru_tags_classified.csv';
var DAPI='https://danbooru.donmai.us';
var PROXY='https://api.allorigins.win/raw?url=';
var artistDB=new Set();
var results=[];
var useProxy=false;
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function parseCSV(ln){var r=[],c='',q=false;for(var i=0;i<ln.length;i++){var ch=ln[i];if(q){if(ch==='"'&&ln[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}else{if(ch==='"'){q=true}else if(ch===','){r.push(c);c=''}else{c+=ch}}}r.push(c);return r}
async function loadCSV(){try{var r=await fetch(CSV);var text=await r.text();var lines=text.split('\n');for(var i=1;i<lines.length;i++){var ln=lines[i].trim();if(!ln)continue;var cols=parseCSV(ln);if(cols.length>=2&&+cols[1]===1)artistDB.add(cols[0].toLowerCase())}}catch(e){}}
function extractArtists(text){var found=[];var seen=new Set();function add(n){n=n.trim().replace(/[\s]+/g,'_').replace(/[,{}[\]()]+$/,'').toLowerCase();if(n&&!seen.has(n)){seen.add(n);found.push(n)}}text.replace(/artist\s*:\s*([a-z0-9_\-\s().']+)/gi,function(m,name){add(name)});text.replace(/@\(([^:)]+)(?::[^)]+)?\)/g,function(m,name){add(name)});var clean=text;clean=clean.replace(/artist\s*:[^,]+/gi,'');clean=clean.replace(/@\([^)]+\)/g,'');clean=clean.replace(/<[^>]+>/g,'');clean=clean.replace(/\d+\.?\d*::/g,'');clean=clean.replace(/::/g,'');clean=clean.replace(/[{}[\]()\\]/g,' ');clean.split(',').forEach(function(t){t=t.trim().replace(/:\s*[\d.]+\s*$/,'').trim();var n=t.replace(/[\s]+/g,'_').toLowerCase();if(n&&artistDB.has(n)&&!seen.has(n)){seen.add(n);found.push(n)}});return found}
async function dFetch(path){if(!useProxy){try{var r=await fetch(DAPI+path);return r}catch(e){useProxy=true}}return fetch(PROXY+encodeURIComponent(DAPI+path))}
async function fetchImages(tag){try{var r=await dFetch('/posts.json?tags='+encodeURIComponent(tag)+'&limit=6');if(!r.ok)return[];var posts=await r.json();var imgs=[];posts.forEach(function(p){var iu=p.large_file_url||p.preview_file_url;if(iu&&imgs.length<6)imgs.push({u:iu,id:p.id})});return imgs}catch(e){return[]}}
function renderTable(){var tb=document.getElementById('tbody');if(!results.length){tb.innerHTML='';return}document.getElementById('info').textContent='';var h='';for(var i=0;i<results.length;i++){var a=results[i];h+='<tr><td class="an"><a href="'+DAPI+'/posts?tags='+encodeURIComponent(a.name)+'" target="_blank" rel="noopener">'+esc(a.name)+'</a></td><td>';if(a.status==='loading'){h+='<span class="al">...</span>'}else if(!a.imgs.length){h+='<span class="ae">결과 없음</span>'}else{h+='<div class="av"><button onclick="pv('+i+',-1)">◀</button><a href="'+DAPI+'/posts/'+a.imgs[a.idx].id+'" target="_blank" rel="noopener"><img src="'+esc(a.imgs[a.idx].u)+'"></a><button onclick="pv('+i+',1)">▶</button><span class="ac">'+(a.idx+1)+'/'+a.imgs.length+'</span></div>'}h+='</td></tr>'}tb.innerHTML=h}
window.pv=function(idx,dir){var a=results[idx];if(!a||!a.imgs.length)return;a.idx=(a.idx+dir+a.imgs.length)%a.imgs.length;renderTable()};
async function run(){var text=document.getElementById('prompt').value.trim();if(!text){document.getElementById('status').textContent='프롬프트를 입력하세요';return}var artists=extractArtists(text);if(!artists.length){document.getElementById('status').textContent='아티스트 태그를 찾을 수 없습니다';results=[];renderTable();document.getElementById('info').textContent='아티스트를 찾을 수 없습니다';return}document.getElementById('status').textContent=artists.length+'명 추출됨';results=artists.map(function(n){return{name:n,imgs:[],idx:0,status:'loading'}});renderTable();for(var i=0;i<results.length;i++){results[i].imgs=await fetchImages(results[i].name);results[i].status='done';renderTable()}}
document.getElementById('gobtn').addEventListener('click',run);
document.getElementById('prompt').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();run()}});
loadCSV();
})();
</script>
</body>
</html>
